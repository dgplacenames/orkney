<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orkney Notes</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');

    :root {
      --stone:   #f0ebe2;
      --sand:    #e2d9cc;
      --slate:   #3d4a52;
      --sea:     #2e5068;
      --ink:     #1e2428;
      --muted:   #7a8a92;
      --rust:    #8b4a2e;
      --tag-bg:  #d8e4eb;
      --card-bg: #faf8f4;
      --border:  #cdc5b8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--stone);
      color: var(--ink);
      min-height: 100vh;
      padding: 0 0 5rem;
    }

    header {
      background: var(--slate);
      color: white;
      padding: 1.4rem 2rem;
      margin-bottom: 2rem;
    }
    header h1 { font-size: 2.2rem; font-weight: 300; letter-spacing: 0.04em; color: white; }
    header h1 em { font-style: italic; color: #a8bfc9; }

    #controls {
      max-width: 720px;
      margin: 0 auto 0.8rem;
      padding: 0 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .control-row { display: flex; gap: 0.8rem; align-items: center; }

    #search {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      padding: 0.6rem 1rem;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      color: var(--ink);
      border-radius: 2px;
      flex: 1;
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: var(--sea); }
    #search::placeholder { color: var(--muted); }

    #tag-select {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      color: var(--slate);
      border-radius: 2px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    #tag-select:focus { border-color: var(--sea); }

    #active-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; min-height: 0; }
    #active-tags:empty { display: none; }

    .active-chip {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      padding: 0.22rem 0.4rem 0.22rem 0.65rem;
      background: var(--sea);
      color: white;
      border-radius: 2px;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .active-chip button {
      background: none; border: none; color: white;
      cursor: pointer; font-size: 0.9rem; line-height: 1; opacity: 0.65; padding: 0;
    }
    .active-chip button:hover { opacity: 1; }

    #meta-bar {
      max-width: 720px;
      margin: 0 auto 1.2rem;
      padding: 0.5rem 1.5rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #count { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted); }
    #clear-btn {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem;
      background: none; border: none; color: var(--muted);
      cursor: pointer; text-decoration: underline; text-underline-offset: 2px;
    }
    #clear-btn:hover { color: var(--rust); }

    #notes-list {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .note-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1.25rem 1.4rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      transition: box-shadow 0.15s, border-color 0.15s;
      scroll-margin-top: 5rem;
    }
    .note-card:hover { box-shadow: 0 3px 16px rgba(46,80,104,0.10); border-color: #b0c0ca; }
    .note-card:target { border-color: var(--sea); box-shadow: 0 0 0 3px rgba(46,80,104,0.15); }

    .card-source {
      display: flex; align-items: baseline; gap: 0.5rem;
      flex-wrap: wrap; padding-bottom: 0.6rem; border-bottom: 1px solid var(--sand);
    }
    .source-title { font-size: 0.85rem; font-weight: 600; color: var(--sea); }
    .source-author { font-size: 0.82rem; font-style: italic; color: var(--muted); }
    .card-page { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--muted); }

    .card-notes { font-size: 1rem; line-height: 1.7; color: #2a3238; }
    .card-notes mark { background: #f5e07a; border-radius: 1px; padding: 0 1px; }

    .card-footer {
      display: flex; align-items: flex-end;
      justify-content: space-between; gap: 0.5rem; margin-top: 0.2rem;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .card-tag {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.67rem;
      padding: 0.15rem 0.45rem; background: var(--tag-bg); color: var(--slate);
      border-radius: 2px; border: none; cursor: pointer; transition: background 0.1s, color 0.1s;
    }
    .card-tag:hover { background: var(--sea); color: white; }
    .card-tag.active { background: var(--sea); color: white; }

    .card-anchor {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem;
      color: var(--muted); text-decoration: none; opacity: 0.5;
      transition: opacity 0.12s; white-space: nowrap; flex-shrink: 0;
    }
    .card-anchor:hover { opacity: 1; color: var(--sea); }

    .card-url a {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem;
      color: var(--sea); word-break: break-all;
      text-decoration: underline; text-underline-offset: 2px;
    }

    #empty { max-width: 720px; margin: 3rem auto; padding: 0 1.5rem; font-style: italic; color: var(--muted); display: none; }
    #error { max-width: 720px; margin: 2rem auto; padding: 1rem 1.5rem; background: #fdf0ee; border-left: 3px solid var(--rust); font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; display: none; }

    @media (max-width: 540px) {
      .control-row { flex-direction: column; align-items: stretch; }
      #tag-select { width: 100%; }
      header h1 { font-size: 1.7rem; }
      #notes-list, #controls, #meta-bar { padding: 0 1rem; }
      .card-footer { flex-direction: column; align-items: flex-start; }
      .card-anchor { align-self: flex-end; }
    }
  </style>
</head>
<body>

<header>
  <h1>Orkney <em>Notes</em></h1>
</header>

<div id="controls">
  <div class="control-row">
    <input id="search" type="search" placeholder="Search notes, sources, authors…" autocomplete="off">
    <select id="tag-select">
      <option value="">Filter by tag…</option>
    </select>
  </div>
  <div id="active-tags"></div>
</div>

<div id="meta-bar">
  <span id="count"></span>
  <button id="clear-btn">clear filters</button>
</div>

<div id="error"></div>
<div id="notes-list"></div>
<div id="empty">No notes match.</div>

<script>
  let SOURCES = {};
  let NOTES = [];
  let activeTags = new Set();
  let searchQuery = '';

  // ── Load data ─────────────────────────────────────────────────────────────
  async function loadData() {
    try {
      const [srcRes, notesRes] = await Promise.all([
        fetch('sources.yaml'),
        fetch('notes.yaml')
      ]);
      if (!srcRes.ok) throw new Error(`Could not load sources.yaml (${srcRes.status})`);
      if (!notesRes.ok) throw new Error(`Could not load notes.yaml (${notesRes.status})`);

      const srcList = jsyaml.load(await srcRes.text()) || [];
      SOURCES = Object.fromEntries(srcList.map(s => [s.id, s]));

      NOTES = jsyaml.load(await notesRes.text()) || [];
      NOTES.forEach(n => {
        n.tags = Array.isArray(n.tags) ? n.tags.map(t => String(t).toLowerCase()) : [];
      });

      buildTagDropdown();
      render();
    } catch (e) {
      const el = document.getElementById('error');
      el.style.display = 'block';
      el.textContent = `Error: ${e.message}`;
    }
  }

  // ── Tag dropdown ──────────────────────────────────────────────────────────
  function buildTagDropdown() {
    const counts = {};
    NOTES.forEach(n => n.tags.forEach(t => counts[t] = (counts[t] || 0) + 1));
    const sorted = Object.keys(counts).sort((a, b) => a.localeCompare(b));
    const sel = document.getElementById('tag-select');
    sorted.forEach(tag => {
      const opt = document.createElement('option');
      opt.value = tag;
      opt.textContent = `${tag} (${counts[tag]})`;
      sel.appendChild(opt);
    });
  }

  function addTag(tag) {
    if (!tag || activeTags.has(tag)) return;
    activeTags.add(tag);
    renderChips();
    render();
  }

  function removeTag(tag) {
    activeTags.delete(tag);
    renderChips();
    render();
  }

  function renderChips() {
    const container = document.getElementById('active-tags');
    container.innerHTML = '';
    activeTags.forEach(tag => {
      const chip = document.createElement('span');
      chip.className = 'active-chip';
      chip.innerHTML = `${tag} <button aria-label="Remove ${tag}">×</button>`;
      chip.querySelector('button').addEventListener('click', () => removeTag(tag));
      container.appendChild(chip);
    });
    const sel = document.getElementById('tag-select');
    sel.value = '';
    sel.options[0].textContent = activeTags.size > 0 ? 'Add another filter…' : 'Filter by tag…';
  }

  document.getElementById('tag-select').addEventListener('change', e => addTag(e.target.value));

  document.getElementById('clear-btn').addEventListener('click', () => {
    activeTags.clear();
    searchQuery = '';
    document.getElementById('search').value = '';
    const sel = document.getElementById('tag-select');
    sel.value = '';
    sel.options[0].textContent = 'Filter by tag…';
    renderChips();
    render();
  });

  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
  });

  // ── Filter ────────────────────────────────────────────────────────────────
  function filtered() {
    const q = searchQuery.toLowerCase().trim();
    return NOTES.filter(n => {
      const src = SOURCES[n.source] || {};
      if (activeTags.size > 0 && ![...activeTags].every(t => n.tags.includes(t))) return false;
      if (!q) return true;
      return (
        (n.notes  || '').toLowerCase().includes(q) ||
        (src.title  || '').toLowerCase().includes(q) ||
        (src.author || '').toLowerCase().includes(q) ||
        n.tags.some(t => t.includes(q))
      );
    });
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function hi(text, q) {
    if (!q) return esc(text);
    const safe = esc(text);
    const re = new RegExp(`(${esc(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return safe.replace(re, '<mark>$1</mark>');
  }

  function render() {
    const list  = document.getElementById('notes-list');
    const empty = document.getElementById('empty');
    const q = searchQuery.toLowerCase().trim();
    const results = filtered();

    document.getElementById('count').textContent = `${results.length} of ${NOTES.length} notes`;
    list.innerHTML = '';
    empty.style.display = results.length === 0 ? 'block' : 'none';

    results.forEach(n => {
      const src  = SOURCES[n.source] || {};
      const card = document.createElement('article');
      card.className = 'note-card';
      card.id = n.id;

      const tagsHtml = n.tags.map(t =>
        `<button class="card-tag${activeTags.has(t) ? ' active' : ''}" data-tag="${esc(t)}">${esc(t)}</button>`
      ).join('');

      const urlHtml = src.url
        ? `<div class="card-url"><a href="${esc(src.url)}" target="_blank" rel="noopener">${esc(src.url)}</a></div>` : '';

      card.innerHTML = `
        <div class="card-source">
          <span class="source-title">${hi(src.title || n.source, q)}</span>
          <span class="source-author">${hi(src.author || '', q)}</span>
          ${n.page ? `<span class="card-page">p. ${esc(n.page)}</span>` : ''}
        </div>
        ${urlHtml}
        <p class="card-notes">${hi(n.notes || '', q)}</p>
        <div class="card-footer">
          <div class="card-tags">${tagsHtml}</div>
          <a class="card-anchor" href="#${esc(n.id)}" title="Direct link">#${esc(n.id)}</a>
        </div>
      `;

      card.querySelectorAll('.card-tag').forEach(btn =>
        btn.addEventListener('click', () => {
          const tag = btn.dataset.tag;
          activeTags.has(tag) ? removeTag(tag) : addTag(tag);
        })
      );

      list.appendChild(card);
    });

    if (location.hash) {
      const el = document.querySelector(location.hash);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  window.addEventListener('hashchange', () => {
    const el = document.querySelector(location.hash);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });

  loadData();
</script>
</body>
</html>
