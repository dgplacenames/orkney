- id: n0001
  title: Fairies in Evie and Sanday
  source: omond-1911
  page: 8
  tags: [fairies, superstitions, Evie, Sanday]
  notes: |
    "This was a great fairy place. The fairies came down from the Warts along Rummerdale, and the walk was called the Fairy Gate. The Knowe of Stenso, Knowe of Howanny Granna, and the old houses of Dyke below Feolquoy, at the road, were also noted for fairies and various adventures were had with these uncanny folk at Hammer Hill and Costa Hill. These were the days of ale-drinking, and it was usually on the return from a bout of dissipation that the fairies were seen.

    Certain people were pointed out as having danced with the fairies, and only escaped from being carried away by drawing a circle round themselves with steel or iron, through which the fairies dare not pass. A common story was the hearing of strange weird music, which, likely enough, might be the strains of the fiddle still ringing in a muddled head. In Sanday the people beuld or shut up the fairies in a lee place and so got rid of them for a while."

- id: n0002
  source: omond-1911
  page: 9
  tags: [superstitions, Evie]
  notes: |
    "The people of that time were very superstitious, especially fishermen. Some of these would not venture to the sea if certain people crossed their path, it did not matter how fine the day was. In some places a cat was considered unlucky; in others the minister could not be named or there would be no fish that day. Curiously, it was allowable to designate him by the name of the man with the black coat. Nor must the name cod be spoken if you are cod fishing; so a knife had to be called some other name, as tullie or ragger. Banff fishermen abhorred the animal the hare, and if the name was mentioned the evil spell could only be broken by touching wood.

    It was also commonly believed that certain people in a parish could steal the profit of cattle or prevent the milk from churning. I have known people who preferred to churn with a flowing tide. One method of getting the profit back was to go to the house of the witch and get her to change a shilling or any white money. Another device was to go to the seashore and go into the ebb backwards and take a thimble full of salt water and pour it into the churn. Probably a kettleful of hot water would have been more efficacious. A volume might be filled with superstitious lore of ancient days, but what of some of us at the present day who dislike the number thirteen or do not like to spill salt?"

- id: n0003
  title: Cromarty Square Propeller
  citation: Plaque
  tags: [St Margaret's Hope]
  notes: |
    "This propeller was found in 1987 by local diver, Raymond Butcher, in West Weddel Sound, Scapa Flow.
    It was lifted by air bag and taken first to Flotta by barge and then transported to St Margaret's Hope.
    It has a diameter of 9 feet and the shaft has a diameter of 7 inches.
    Its origin is unknown. The date of manufacture is 22 December 1957.
    It was donated by Stephen Manson
    SRBCC"